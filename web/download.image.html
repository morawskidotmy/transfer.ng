<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Filename}}</title>
  <meta property="og:type" content="image">
  <meta property="og:title" content="{{.Filename}}">
  <meta property="og:description" content="{{.Filename}} - {{.ContentLength}} bytes">
  <meta property="og:image" content="{{.URLGet}}">
  <meta property="og:image:type" content="{{.ContentType}}">
  <meta property="og:image:secure_url" content="{{.URLGet}}">
  <meta property="og:url" content="{{.URL}}">
  <meta property="og:site_name" content="{{.Hostname}}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{.Filename}}">
  <meta name="twitter:description" content="{{.Filename}} - {{.ContentLength}} bytes">
  <meta name="twitter:image" content="{{.URLGet}}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --discord-blue: #7289da;
      --discord-white: #ffffff;
      --discord-steel: #99aab5;
      --discord-jet: #2c2f33;
      --discord-shadow: #23272a;
    }
    body { 
      font-family: "Courier New", monospace; 
      background: var(--discord-shadow); 
      color: var(--discord-white); 
      padding: 20px;
      line-height: 1.4;
    }
    .container { 
      max-width: 1200px;
      margin: 0 auto;
      padding: 15px;
    }
    .header {
      text-align: center;
      border-bottom: 1px solid var(--discord-blue);
      padding-bottom: 10px;
      margin-bottom: 15px;
      border: 1px solid var(--discord-blue);
      padding: 10px;
    }
    .image-section {
      border: 1px solid var(--discord-blue);
      padding: 15px;
      margin: 15px auto;
      text-align: center;
      max-width: 800px;
    }
    @media (max-width: 768px) {
      .image-section {
        padding: 12px;
        margin: 12px 0;
      }
    }
    @media (max-width: 480px) {
      .image-section {
        padding: 10px;
        margin: 10px 0;
      }
    }
    img { 
      max-width: 100%;
      max-height: 70vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border: 1px solid var(--discord-blue);
      margin: 10px 0;
    }
    .info-section {
      border: 1px dashed var(--discord-steel);
      padding: 10px;
      margin: 15px auto;
      max-width: 100ch;
    }
    .label { 
      font-weight: bold;
      margin-bottom: 8px;
      text-transform: uppercase;
      font-size: 0.9em;
    }
    .info-row { margin: 6px 0; }
    button { 
      background: var(--discord-blue); 
      color: var(--discord-white); 
      border: 1px solid var(--discord-blue); 
      padding: 8px 16px; 
      cursor: pointer;
      font-family: "Courier New", monospace;
      font-weight: bold;
      margin: 8px 4px 8px 0;
      font-size: 0.95em;
    }
    @media (max-width: 480px) {
      button {
        display: block;
        width: 100%;
        margin: 8px 0;
        padding: 10px 8px;
      }
    }
    button:hover { 
      background: var(--discord-steel);
      color: var(--discord-shadow);
      box-shadow: 0 0 5px var(--discord-blue);
    }
    code { 
      background: var(--discord-jet); 
      padding: 1px 4px;
      border: 1px solid var(--discord-steel);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      [ IMAGE PREVIEW ] - {{.Hostname}}
    </div>

    <div class="image-section">
      <img src="{{.URLGet}}" alt="{{.Filename}}">
    </div>

    <div class="info-section">
      <div class="label">File Info</div>
      <div class="info-row">Name: <code>{{.Filename}}</code></div>
      <div class="info-row">Size: <code>{{.ContentLength}} bytes</code></div>
      <div class="info-row">Type: <code>{{.ContentType}}</code></div>
    </div>

    <div class="info-section">
      <div class="label">Actions</div>
      <button onclick="window.location.href='{{.URLGet}}'">[ DOWNLOAD ]</button>
      <button onclick="copyToClipboard('{{.URLGet}}')">[ COPY LINK ]</button>
    </div>
  </div>

  <script>
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('Link copied!');
      });
    }
  </script>
</body>
</html>
