<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Filename}}</title>
  <meta name="description" content="Preview and download audio {{.Filename}} from {{.Hostname}}. Size: {{.ContentLength}} bytes.">
  <link rel="canonical" href="{{.URL}}">
  <meta name="robots" content="noindex,nofollow">
  <meta property="og:type" content="music.song">
  <meta property="og:title" content="{{.Filename}}">
  <meta property="og:description" content="{{.Filename}} - {{.ContentLength}} bytes">
  <meta property="og:audio" content="{{.URLGet}}">
  <meta property="og:audio:type" content="{{.ContentType}}">
  <meta property="og:url" content="{{.URL}}">
  <meta property="og:site_name" content="{{.Hostname}}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{.Filename}}">
  <meta name="twitter:description" content="{{.Filename}} - {{.ContentLength}} bytes">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --discord-blue: #7289da;
      --discord-white: #ffffff;
      --discord-steel: #99aab5;
      --discord-jet: #2c2f33;
      --discord-shadow: #23272a;
    }
    body { 
      font-family: "Courier New", monospace; 
      background: var(--discord-shadow); 
      color: var(--discord-white); 
      padding: 20px;
      line-height: 1.4;
    }
    .container { 
      max-width: 100ch; 
      margin: 0 auto;
      border: 1px solid var(--discord-blue);
      padding: 15px;
    }
    .header {
      text-align: center;
      border-bottom: 1px solid var(--discord-blue);
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    .audio-section {
      border: 1px dashed var(--discord-steel);
      padding: 15px;
      margin: 15px 0;
      text-align: center;
    }
    @media (max-width: 768px) {
      .audio-section {
        padding: 12px;
        margin: 12px 0;
      }
    }
    @media (max-width: 480px) {
      .audio-section {
        padding: 10px;
        margin: 10px 0;
      }
    }
    audio { 
      width: 100%;
      max-width: 400px;
      margin: 10px 0;
    }
    @media (max-width: 480px) {
      audio {
        max-width: 100%;
      }
    }
    .info-section {
      border: 1px dashed var(--discord-steel);
      padding: 10px;
      margin: 15px 0;
    }
    .label { 
      font-weight: bold;
      margin-bottom: 8px;
      text-transform: uppercase;
      font-size: 0.9em;
    }
    .info-row { margin: 6px 0; }
    .button-link {
      display: inline-block;
      background: var(--discord-blue);
      color: var(--discord-white);
      border: 1px solid var(--discord-blue);
      padding: 8px 16px;
      cursor: pointer;
      font-family: "Courier New", monospace;
      font-weight: bold;
      margin: 8px 4px 8px 0;
      font-size: 0.95em;
      text-decoration: none;
    }
    .button-link:hover {
      background: var(--discord-steel);
      color: var(--discord-shadow);
      box-shadow: 0 0 5px var(--discord-blue);
    }
    @media (max-width: 480px) {
      .button-link {
        display: block;
        width: 100%;
        margin: 8px 0;
        padding: 10px 8px;
        text-align: center;
      }
    }
    .link-input {
      width: 100%;
      background: var(--discord-jet);
      color: var(--discord-white);
      border: 1px solid var(--discord-steel);
      padding: 8px;
      font-family: "Courier New", monospace;
      font-size: 0.9em;
      margin-top: 4px;
    }
    .link-input:focus {
      outline: none;
      border-color: var(--discord-blue);
    }
    code { 
      background: var(--discord-jet); 
      padding: 1px 4px;
      border: 1px solid var(--discord-steel);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      [ AUDIO PLAYER ] - {{.Hostname}}
    </div>

    <div class="audio-section">
      <audio controls>
        <source src="{{.URLGet}}" type="{{.ContentType}}">
        Audio playback not supported.
      </audio>
    </div>

    <div class="info-section">
      <div class="label">File Info</div>
      <div class="info-row">Name: <code>{{.Filename}}</code></div>
      <div class="info-row">Size: <code>{{.ContentLength}} bytes</code></div>
      <div class="info-row">Type: <code>{{.ContentType}}</code></div>
    </div>

    <div class="info-section">
      <div class="label">Actions</div>
      <a href="{{.DirectoryURL}}" class="button-link">[ BACK TO DIRECTORY ]</a>
      <a href="{{.URLGet}}" class="button-link">[ DOWNLOAD ]</a>
    </div>

    <div class="info-section">
      <div class="label">Direct Link</div>
      <input type="text" readonly value="{{.URLGet}}" class="link-input" onclick="this.select()">
    </div>
  </div>
</body>
</html>
