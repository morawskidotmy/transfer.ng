run:
  timeout: 10m
  issues-exit-code: 1
  tests: true

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters:
  enable:
    - gofmt
    - govet
    - revive
    - staticcheck
    - gosimple
    - ineffassign
    - misspell
    - goimports

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
      - name: var-naming
        severity: warning
        arguments:
          - []
          - ["ID", "URL", "HTTP", "JSON", "XML", "API", "UI", "IDP", "IP", "VM", "CPU", "RAM", "DNS", "CORS", "CorsDomains"]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  exclude-use-default: false
