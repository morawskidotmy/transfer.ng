version: "2"

run:
  timeout: 10m
  issues-exit-code: 1
  tests: true

output:
  formats:
    text:
      path: stdout
      print-issued-lines: true
      print-linter-name: true

linters:
  enable:
    - govet
    - revive
    - staticcheck
    - ineffassign
    - misspell
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning
          arguments:
            - []
            - ["ID", "URL", "HTTP", "JSON", "XML", "API", "UI", "IDP", "IP", "VM", "CPU", "RAM", "DNS", "CORS", "CorsDomains"]

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  exclude-use-default: false
