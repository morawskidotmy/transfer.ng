name: test
on:
  workflow_dispatch:
  pull_request:
  push:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go_version:
          - '1.26.4'
          - tip
    name: Test with ${{ matrix.go_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Go ${{ matrix.go_version }}
        if: ${{ matrix.go_version != 'tip' }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}
          check-latest: true
      - name: Install Go ${{ matrix.go_version }}
        if: ${{ matrix.go_version == 'tip' }}
        run: |
          go install golang.org/dl/gotip@latest
          `go env GOPATH`/bin/gotip download
      - name: Vet and test no tip
        if: ${{ matrix.go_version != 'tip' }}
        run: |
          go version
          go vet ./...
          go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Vet and test gotip
        if: ${{ matrix.go_version == 'tip' }}
        run: |
          `go env GOPATH`/bin/gotip version
          `go env GOPATH`/bin/gotip vet ./...
          `go env GOPATH`/bin/gotip test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Upload coverage
        if: ${{ matrix.go_version == '1.26.4' }}
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt
          fail_ci_if_error: false
  golangci:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          check-latest: true
      - name: Install golangci-lint with Go 1.26
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run --config .golangci.yml
  gosec:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          check-latest: true
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: "-exclude-generated -quiet ./..."
